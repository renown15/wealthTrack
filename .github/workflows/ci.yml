name: WealthTrack CI/CD

on:
  push:
    branches: [main, develop, 'feature/**', 'bugfix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop, 'feature/**', 'bugfix/**', 'hotfix/**']

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Backend Python tests
  backend-lint-and-test:
    name: Backend - Lint, Type Check, and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: wealthtrack
          POSTGRES_PASSWORD: wealthtrack_test
          POSTGRES_DB: wealthtrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff linter
        working-directory: ./backend
        run: |
          ruff check app/ tests/

      - name: Run mypy type checker
        working-directory: ./backend
        run: |
          mypy app/ --config-file mypy.ini

      - name: Run pytest with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://wealthtrack:wealthtrack_test@localhost:5432/wealthtrack_test
          SECRET_KEY: test-secret-key
          ENVIRONMENT: test
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Frontend TypeScript tests
  frontend-lint-and-test:
    name: Frontend - Lint, Type Check, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

